<!--/* This is the create account page for the website. 
It allows users to create an account by providing their username, email, and password. 
The form will be submitted to the server for processing and validation.
*/-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>

     <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <!-- Animated background blobs (identical to login) -->
    <div class="page-background">
        <div class="floating-shapes">
            <div class="soft-blob blob-1"></div>
            <div class="soft-blob blob-2"></div>
            <div class="soft-blob blob-3"></div>
            <div class="soft-blob blob-4"></div>
        </div>
    </div>

    <a href="{{ url_for('home') }}" class="auth-exit-global d-inline-flex align-items-center">
        ← Back to home page
    </a>
    <!-- Sign-up card -->
    <div class="signup-container">
        <div class="soft-card d-flex">
            <!-- Form -->
            <form class="comfort-form" id="signupForm" novalidate>
                <div classs = "signup-header">
                    <h1 class = "signup-title text-center">Create account</h1>
                    <p class = "signup-subtitle text-center">Join our cooking community</p>
                </div>
                <div class = "row g-3">
                    <div class = "col-6 soft-field">
                        <div class = "form-floating field-container">
                            <input type="text" class="form-control" id="firstName" placeholder="First name" required>
                            <label for="firstName">First name</label>
                            <div class="field-accent"></div>
                        </div>
                        <span class="gentle-error" id="firstNameError"></span>
                    </div>

                    <div class = "col-6 soft-field">
                        <div class = "form-floating field-container">
                            <input type="text" class="form-control" id="lastName" placeholder="Last name" required>
                            <label for="lastName">Last name</label>
                            <div class="field-accent"></div>
                        </div>
                        <span class="gentle-error" id="lastNameError"></span>
                    </div>
                    <!-- Email -->
                    <div class="soft-field">
                        <div class="form-floating field-container">
                            <input type="email"
                                    class="form-control"
                                    id="email"
                                    placeholder="Email"
                                    required>
                            <label for="email">Email address</label>
                            <div class="field-accent"></div>
                        </div>
                        <span class="gentle-error" id="emailError"></span>
                    </div>

                    <!-- Password -->
                    <div class="soft-field">
                        <div class="form-floating field-container">
                            <input type="password"
                                    class="form-control"
                                    id="password"
                                    placeholder="Password"
                                    required>
                            <label for="password">Password</label>
                            <button type="button"
                                    class="gentle-toggle"
                                    id="passwordToggle"
                                    aria-label="Toggle password visibility"
                                    aria-pressed="false">
                                <span class="toggle-icon">
                                    <i class="bi bi-eye eye-open"></i>
                                    <i class="bi bi-eye-slash eye-closed"></i>
                                </span>
                            </button>
                            <div class="field-accent"></div>
                        </div>
                        <div class="strength-bar-wrap mt-1" id="strengthBar"></div>
                        <div class="strength-label" id="strengthLabel"></div>
                        <span class="gentle-error" id="passwordError"></span>
                    </div>

                    <!-- Confirm password -->
                    <div class="soft-field">                                  
                        <div class="form-floating field-container">
                            <input type="password"
                                    class="form-control"
                                    id="confirmPassword"
                                    placeholder="Confirm password"
                                    required>
                            <label for="confirmPassword">Confirm password</label>
                            <button type="button"
                                class="gentle-toggle"
                                id="confirmToggle"
                                aria-label="Toggle confirm password visibility"
                                aria-pressed="false">
                                <span class="toggle-icon">
                                    <i class="bi bi-eye eye-open"></i>
                                    <i class="bi bi-eye-slash eye-closed"></i>
                                </span>
                            </button>
                            <div class="field-accent"></div>
                        </div>
                        <span class="gentle-error" id="confirmError"></span>
                    </div>

                    <!-- Terms checkbox -->
                     <div class="soft-field">
                         <div class="form-check gentle-checkbox-wrap">
                             <input class="form-check-input gentle-check-input"
                                     type="checkbox"
                                     id="terms">
                             <label class="form-check-label gentle-check-label" for="terms">
                                 I agree to the
                                 <a href="{{ url_for('terms') }}#terms" class="comfort-link">Terms</a>
                                 and
                                 <a href="{{ url_for('privacy') }}#privacy" class="comfort-link">Privacy Policy</a>
                             </label>
                         </div>
                         <span class="gentle-error d-block" id="termsError"></span>

                        <!-- Create account button -->
                        <button type="submit" class="create_account_button comfort-button w-100">
                            <div class="button-background"></div>
                            <span class="button-text">Create account</span>
                            <div class="button-loader">
                                <div class="gentle-spinner">
                                    <div class="spinner-circle"></div>
                                </div>
                            </div>
                            <div class="button-glow"></div>
                        </button>
                     </div>

                    <!-- Already have account -->
                    <div class="comfort-signup text-center mt-3">
                            <span class="signup-text ">Already have an account?</span>
                            <a href="{{ url_for('login') }}" class="comfort-link signup-link ms-1">Sign in</a>
                    </div>
                </div>
            </form>

            <!-- Success state -->
            <div class="gentle-success text-center" id="successMessage">
                <div class="success-bloom mx-auto mb-3">
                    <div class="bloom-rings">
                        <div class="bloom-ring ring-1"></div>
                        <div class="bloom-ring ring-2"></div>
                        <div class="bloom-ring ring-3"></div>
                    </div>
                    <div class="success-icon">
                        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                            <path d="M8 14l5 5 11-11" stroke="currentColor" stroke-width="2.5"
                                  stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>
                <h3 class="success-title">Welcome aboard!</h3>
                <p class="success-desc">Your account is ready. Taking you in...</p>
            </div>

        </div><!-- /soft-card -->
    </div><!-- /signup-container -->

    <!-- Bootstrap 5 JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/signup-script.js') }}" defer></script>

</body>
</html>
