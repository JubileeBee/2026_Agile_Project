{% extends "base.html" %}

{% block content %}

<!-- External CSS -->
<link rel="stylesheet"
      href="{{ url_for('static', filename='css/add_recipe.css') }}">

<div class="container">

    <h1>Add Your Recipe</h1>

    <form id="addRecipeForm"
      action="/add_recipe"
      method="POST"
      enctype="multipart/form-data">

    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <!-- =========================
             Recipe Title
        ========================== -->

        <label for="title">Recipe Title</label>

        <input
            type="text"
            id="title"
            name="title"
            placeholder="Enter your recipe title..."
            required
        >

        <!-- =========================
             Description
        ========================== -->

        <label for="description">Description</label>

        <textarea
            id="description"
            name="description"
            rows="3"
            maxlength="300"
            placeholder="Briefly describe your recipe (e.g. flavour, texture, occasion)..."
            required
        ></textarea>

        <small class="char-count" id="desc-count">
            0 / 300
        </small>

        <!-- =========================
             Time & Servings
        ========================== -->

        <div class="time-grid">

            <div>
                <label for="prep_time">Prep Time (mins)</label>

                <input
                    type="number"
                    id="prep_time"
                    name="prep_time"
                    min="0"
                    required
                >
            </div>

            <div>
                <label for="cook_time">Cook Time (mins)</label>

                <input
                    type="number"
                    id="cook_time"
                    name="cook_time"
                    min="0"
                    required
                >
            </div>


            <div>
                <label for="servings">Servings</label>

                <input
                    type="number"
                    id="servings"
                    name="servings"
                    min="1"
                    required
                >
            </div>

        </div>


        <!-- ========================
             Category & Difficulty
        ========================= -->

        <div class="time-grid">

            <div>

                <label for="category">Category</label>

                <select
                    id="category"
                    name="category"
                    required
                >

                    <option value="">Select Category</option>

                    <option value="BREAKFAST">Breakfast</option>
                    <option value="LUNCH">Lunch</option>
                    <option value="DINNER">Dinner</option>
                    <option value="DESSERT">Dessert</option>
                    <option value="DRINK">Drink</option>
                    <option value="SNACK">Snack</option>
                    <option value="BRUNCH">Brunch</option>

                </select>

            </div>

            <div>

                <label for="difficulty">Difficulty</label>

                <select
                    id="difficulty"
                    name="difficulty"
                    required
                >

                    <option value="">Select Difficulty</option>

                    <option value="EASY">Easy</option>
                    <option value="MEDIUM">Medium</option>
                    <option value="HARD">Hard</option>

                </select>

            </div>

        </div>
        <!-- =========================
             Ingredients
        ========================== -->

        <label>Ingredients</label>

        <div id="ingredients-container">

            <div class="ingredient-row">

                <input
                    type="text"
                    name="ingredient_name[]"
                    placeholder="Ingredient (e.g. flour)"
                    required
                >

                <input
                    type="text"
                    name="ingredient_quantity[]"
                    placeholder="Qty (e.g. 2)"
                    required
                >

                <input
                    type="text"
                    name="ingredient_unit[]"
                    placeholder="Unit (e.g. cups)"
                >

                <button
                    type="button"
                    class="remove-btn">

                    X

                </button>

            </div>

        </div>

        <button
            type="button"
            class="btn"
            id="add-ingredient-btn">

            + Add Ingredient

        </button>

        <!-- =========================
             Instructions
        ========================== -->

        <label for="instructions">Instructions</label>

        <textarea
            id="instructions"
            name="instructions"
            rows="6"
            placeholder="Write your cooking instructions here..."
            required
        ></textarea>

        <!-- =========================
             Optional Fields
        ========================== -->

        <label for="notes">
            Notes
            <span class="optional">(optional)</span>
        </label>

        <textarea
            id="notes"
            name="notes"
            rows="3"
            placeholder="Extra tips or serving suggestions..."
        ></textarea>

        <!-- =========================
             Image Upload
        ========================== -->

        <label for="image">Upload Recipe Image</label>

        <input
            type="file"
            name="image"
            id="image"
            accept="image/*"
        >

        <!-- =========================
             Submit Button
        ========================== -->

        <button
            type="submit"
            class="btn">

            Submit Recipe

        </button>

    </form>

</div>

<!-- External JS -->
<script
    src="{{ url_for('static', filename='js/add_recipe.js') }}"
    defer>
</script>

{% endblock %}
