<!--Login page for the website. 
    Has a soft minimalist design with animated background elements and a clean, user-friendly interface.
    The form includes fields for email and password, a remember me checkbox--> 
 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!--External CSS file for styling-->
    <link rel="stylesheet" href="{{ url_for('static', filename = 'css/auth.css') }}">
</head>
<body>
    <!--Animated background elements-->
    <div class="page-background">
        <div class="floating-shapes">
            <div class="soft-blob blob-1"></div>
            <div class="soft-blob blob-2"></div>
            <div class="soft-blob blob-3"></div>
            <div class="soft-blob blob-4"></div>
        </div>
    </div>
    <a href="{{ url_for('home') }}" class="auth-exit-global d-inline-flex align-items-center">
        ← Back to home page
    </a>

    <!--Login form container-->
    <div class="login-container">
        <div class="soft-card">
            <!-- Header -->
            <div class="login-header">
                <!--Welcome message and subtitle--> 
                <h1 class="login-title">Welcome back</h1>
                <p class="login-subtitle">Cooking is a love story</p>
            </div>
            <!--Login form with email and password fields, remember me checkbox, and submit button-->
            <form class="comfort-form" id="loginForm" novalidate>
                <!-- Email -->
                <div class="soft-field mb 2">
                    <div class="form-floating field-container">
                        <input type="email"
                                class = "form-control" 
                                id="email" name="email" 
                                placeholder="Email address"
                                required autocomplete="email">
                        <label for="email">Email address</label>
                        <div class="field-accent"></div>
                    </div>
                    <span class="gentle-error" id="emailError"></span>
                </div>
                
                <!-- Password -->
                <div class="soft-field mb 2">
                    <div class="form-floating field-container">
                        <input type="password"
                                class = "form-control"
                                id="password" name="password" 
                                placeholder="Password"
                                required autocomplete="current-password">
                        <label for="password">Password</label>
                        <button type="button" 
                                class="gentle-toggle" 
                                id="passwordToggle" 
                                aria-label="Toggle password visibility"
                                aria-pressed="false">
                                <span class="toggle-icon">
                                    <i class="bi bi-eye eye-open"></i>
                                    <i class="bi bi-eye-slash eye-closed"></i>
                                </span>
                        </button>
                        <div class="field-accent"></div>
                    </div>
                    <span class="gentle-error" id="passwordError"></span>
                </div>
                
                <!-- Remember me / Forgot Password -->
                <!--<div class="remember_me_forgot_pass">
                    <label class="gentle-checkbox">
                        <input type="checkbox" id="remember" name="remember">
                        <span class="checkbox-soft">
                            <div class="check-circle"></div>
                            <svg class="check-mark" width="12" height="10" viewBox="0 0 12 10" fill="none">
                                <path d="M1 5l3 3 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                        <span class="checkbox-text">Remember me</span>
                    </label>
                    <a href="#" class="comfort-link">Forgot password?</a>
                </div>-->
                 <div class="remember_me_forgot_pass d-flex justify-content-between align-items-center flex-wrap mb-4">
                    <div class="form-check gentle-checkbox-wrap">
                        <input class="form-check-input gentle-check-input"
                               type="checkbox" id="remember" name="remember">
                        <label class="form-check-label gentle-check-label" for="remember">
                            Remember me
                        </label>
                    </div>
                    <a href="#" class="comfort-link">Forgot password?</a>
                </div>

                <!-- Sign in button -->
                <button type="submit" 
                        class="sign_in_button comfort-button w-100 mb4"
                        id = "signInBtn">
                    <div class="button-background"></div>
                    <span class="button-text">Sign in</span>
                    <div class="button-loader">
                        <div class="gentle-spinner">
                            <div class="spinner-circle"></div>
                        </div>
                    </div>
                    <div class="button-glow"></div>
                </button>
            </form>


            <!-- Sign-up Link -->
            <div class="comfort-signup text-center mt-3">
                <span class="signup-text">Don't have an account?</span>
                <a href="{{ url_for('signup') }}" class="comfort-link signup-link">Sign up</a>          
            </div>

            <!-- Success message -->
            <div class="gentle-success" id="successMessage">
                <div class="success-bloom mx-auto mb-3">
                    <div class="bloom-rings">
                        <div class="bloom-ring ring-1"></div>
                        <div class="bloom-ring ring-2"></div>
                        <div class="bloom-ring ring-3"></div>
                    </div>
                    <div class="success-icon">
                        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                            <path d="M8 14l5 5 11-11" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>
                <h3 class="success-title">Welcome!</h3>
                <p class="success-desc">Taking you to your dashboard...</p>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src = "{{ url_for('static', filename = 'js/login-script.js') }}" defer></script>    
            
</body>
</html>
