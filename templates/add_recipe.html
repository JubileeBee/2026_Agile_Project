<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Recipe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/add_recipe-style.css') }}">
</head>
<body>
    <div class="container">
    <h1>Add Your Recipe</h1>

    <form action="/add_recipe" method="POST" enctype="multipart/form-data">

        <!-- Title -->
        <div>
            <label for="title">Recipe Title</label>
            <input type="text" id="title" name="title" required>
        </div>

        <!-- Image -->
        <div>
            <label for="image">Upload Image</label>
            <input type="file" id="image" name="image" accept="image/*">
        </div>

        <!-- Times -->
        <div class="grid-3">
            <div>
                <label for="prep_time">Prep Time (mins)</label>
                <input type="number" id="prep_time" name="prep_time" required>
            </div>

            <div>
                <label for="cook_time">Cook Time (mins)</label>
                <input type="number" id="cook_time" name="cook_time" required>
            </div>

            <div>
                <label for="servings">Servings</label>
                <input type="number" id="servings" name="servings" required>
            </div>
        </div>

        <!-- Ingredients -->
        <div>
            <label for="ingredients">Ingredients</label>
            <textarea id="ingredients" name="ingredients" rows="5" placeholder="One ingredient per line..." required></textarea>
        </div>

        <!-- Instructions -->
        <div>
            <label for="instructions">Instructions</label>
            <textarea id="instructions" name="instructions" rows="7" placeholder="Step-by-step instructions..." required></textarea>
        </div>

        <!-- Allergies -->
        <div>
            <label for="allergies">Allergies <span class="optional">(optional)</span></label>
            <input type="text" id="allergies" name="allergies" placeholder="e.g. nuts, dairy">
        </div>

        <!-- Notes -->
        <div>
            <label for="notes">Notes <span class="optional">(optional)</span></label>
            <textarea id="notes" name="notes" rows="4" placeholder="Extra tips, substitutions..."></textarea>
        </div>

        <!-- Submit -->
        <button type="submit">Submit Recipe</button>

    </form>
</div>

</body>
</html>
</body>
</html>
