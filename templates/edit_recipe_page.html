{% extends "layout.html" %}

{% block content %}
<div class="recipe-form-container">

    <h2 class="form-title">Edit Recipe</h2>

    <form method="POST" action="{{ url_for('edit_recipe') }}" enctype="multipart/form-data">

        <div class="form-group">
            <label>Recipe Title</label>
            <input type="text" name="title" value="Spaghetti Bolognese" required>
        </div>

        <div class="form-group">
            <label>Ingredients</label>
            <textarea name="ingredients" rows="4" required>Tomatoes, Pasta, Beef, Garlic</textarea>
        </div>

        <div class="form-group">
            <label>Instructions</label>
            <textarea name="steps" rows="4" required>Boil pasta, cook beef, mix sauce...</textarea>
        </div>

        <div class="form-group">
            <label>Upload New Image</label>
            <input type="file" name="image">
        </div>

        <button type="submit" class="submit-btn">Update Recipe</button>

    </form>
</div>
{% endblock %}
