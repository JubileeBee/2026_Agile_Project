{% extends "base.html" %}

{% block content %}

<div class="recipe-form-container">

    <h2 class="form-title">Edit Recipe</h2>

    {% if recipe %}
    <form method="POST" action="{{ url_for('edit_recipe', recipe_id=recipe.id) }}" enctype="multipart/form-data">

        <div class="form-group">
            <label>Recipe Title</label>
            <input type="text" name="title" value="{{ recipe.title }}" required>
        </div>

        <div class="form-group">
            <label>Ingredients</label>
            <textarea name="ingredients" rows="4" required>{{ recipe.ingredients }}</textarea>
        </div>

        <div class="form-group">
            <label>Upload New Image</label>
            <input type="file" name="image">
        </div>

        <button type="submit" class="submit-btn">Update Recipe</button>

    </form>
    {% else %}
        <p>Recipe not found</p>
    {% endif %}

</div>

{% endblock %}
