{% extends "base.html" %}

{% block content %}

<div class="recipe-form-container">

    <h2 class="form-title">Add New Recipe</h2>

    <form method="POST" action="{{ url_for('create_recipe') }}" enctype="multipart/form-data">

        <div class="form-group">
            <label>Recipe Title</label>
            <input type="text" name="title" required>
        </div>

        <div class="form-group">
            <label>Ingredients</label>
            <textarea name="ingredients" rows="4" required></textarea>
        </div>

        <div class="form-group">
            <label>Instructions</label>
            <textarea name="steps" rows="4" required></textarea>
        </div>

        <div class="form-group">
            <label>Upload Image</label>
            <input type="file" name="image">
        </div>

        <button type="submit" class="submit-btn">Submit</button>

    </form>

</div>

{% endblock %}
